<!DOCTYPE html>
<html lang="en">

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" type="text/css" href="/html/Register&Login/style.css" />
    <link rel="stylesheet" type="text/css" href="/html/Register&Login/signup.css" />
    <link rel="stylesheet" type="text/css" href="/html/Register&Login/responsive.css" />
</head>

<body>
    <div id="wrapper">
        

        <div id="signUp">
            <h2>Create an Account</h2>

            <div id="formContainer">
                <form id="signupForm">
                    <div class="form-row col-6">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" class="form-control" name="firstname" id="firstname"
                                placeholder="First Name" maxlength="15" required onkeydown="return /[a-z]/i.test(event.key)">
                        </div>
                    </div>

                    <div class="form-row col-6">
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" class="form-control" name="lastname" id="lastname"
                                placeholder="Last Name" maxlength="30" required onkeydown="return /[a-z]/i.test(event.key)">
                        </div>
                    </div>

                    <div class="form-row col-6">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" class="form-control" name="username" id="username" placeholder="Username"
                                required>
                        </div>
                    </div>

                    <div class="form-row col-6">
                        <div class="form-group">
                            <label for="phone">Phone</label>
                            <input type="tel" class="form-control" name="phone" id="phone" placeholder="Phone" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" class="form-control" name="email" id="email" placeholder="Email" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="input-group" id="show-hide-password">
                                <input type="password" placeholder="Password" name="password" class="form-control" id="password" required>
                            </div>
                        </div>
                    </div>

                    <button type="button" id="signupBtn">Sign up</button>
                    <p id="loginDesc">Already have an account? <a href="/html/Register&Login/login.html">Login</a></p>
                    <p id="loginDesc">By creating an account, you agree to our <a href="/ThriveSphere/html/">Privacy Policy</a> and <a href="/termsandconditions">Terms & Conditions</a></p>
                </form>
            </div>
        </div>

    </div>

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);


        // Handle sign-up event
        document.getElementById("signupBtn").addEventListener("click", async () => {
            const firstname = document.getElementById("firstname").value;
            const lastname = document.getElementById("lastname").value;
            const username = document.getElementById("username").value;
            const phone = document.getElementById("phone").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            if (!firstname || !lastname || !username || !email || !password) {
                alert("Please fill in all required fields.");
                return;
            }

            try {
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                await firebase.auth().updateProfile(user, { displayName: `${firstname} ${lastname}` });
                alert(`Sign-up successful! Welcome, ${user.displayName}`);
            } catch (error) {
                alert(error.message);
            }
        });
    </script>
</body>

</html>
