<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="COMP 2800 - ThriveSphere">
    <title>CureByDiet - Login</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/html/Register&Login/logog.png">

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/410249dbdb.js" crossorigin="anonymous"></script>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" type="text/css" href="/html/Register&Login/style.css">
    <link rel="stylesheet" type="text/css" href="/html/Register&Login/login.css">
    <link rel="stylesheet" type="text/css" href="/html/Register&Login/responsive.css">
</head>

<body>
    <div id="wrapper">
        <!-- Navigation Bar -->

        <!-- Login Section -->
        <main id="loginContainer">
            <div class="login-grid">
                <div class="login-image">
                    <img src="/html/Register&Login/logog.png" alt="Login Graphic">
                </div>

                <div class="login-form">
                    <section id="loginSec">
                        <h2>Welcome</h2>
                        <div id="formContainer">
                            <form id="loginForm">
                                <div class="form-row">
                                    <label for="email">Email Address</label>
                                    <input type="email" class="form-control" name="email" id="email" placeholder="Email" required>
                                </div>

                                <div class="form-row">
                                    <label for="password">Password</label>
                                    <div class="input-group">
                                        <input type="password" placeholder="Password" name="password" class="form-control" id="password" required>
                                        <div class="input-group-addon">
                                            <i class="fa fa-eye-slash toggle-password" aria-hidden="true"></i>
                                        </div>
                                    </div>
                                </div>

                                <button type="button" id="loginBtn" href="/html/home.html">Login</button>
                                <p id="signupDesc">Don't have an account? <a href="/html/Register&Login/sign-up.html">Sign Up</a></p>
                                <p id="loginErrorMessage">&nbsp;</p>
                            </form>
                        </div>
                    </section>
                </div>
            </div>
        </main>

        <!-- Footer Section -->
        <footer id="footerPlaceHolder">
            <p>CureByDiet &copy; 2025</p>
        </footer>
    </div>

    <!-- Success Modal -->
    <div id="loginSuccessModal">
        <div id="loginSuccessContainer">
            <div id="loginSuccessBg">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M8 15S3 13 3 8s2-6 5-6 5 4 5 6-5 7-5 7z"/></svg>
            </div>
            <p>Login Successful!</p>
        </div>
    </div>



    <!-- Password Toggle and Login Script -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Toggle password visibility
            const passwordField = document.getElementById("password");
            const togglePasswordIcon = document.querySelector(".toggle-password");

            togglePasswordIcon.addEventListener("click", function(event) {
                event.preventDefault();
                const type = passwordField.getAttribute("type") === "password" ? "text" : "password";
                passwordField.setAttribute("type", type);
                togglePasswordIcon.classList.toggle("fa-eye");
                togglePasswordIcon.classList.toggle("fa-eye-slash");
            });

            // Login button click event
            document.getElementById("loginBtn").addEventListener("click", function() {
                const email = document.getElementById("email").value.trim();
                const password = document.getElementById("password").value.trim();
                const loginErrorMessage = document.getElementById("loginErrorMessage");

                loginErrorMessage.textContent = ""; // Clear previous error

                if (!email || !password) {
                    loginErrorMessage.textContent = "Please fill out all fields.";
                    return;
                }

                // Mock login validation
                if (email === "sahilnale09@gmail.com" && password === "Pass@123") {
                    document.getElementById("loginSuccessModal").style.display = "flex";
                    window.location.href = "/html/home.html";
                    
                    setTimeout(() => {
                        document.getElementById("loginSuccessModal").style.display = "none";
                        window.location.href = "/html"; 
                    }, 1500);
                } else {
                    document.getElementById("loginErrorMessage").textContent = "Invalid email or password.";
                }

            });
        });

        // Styling for success modal (Optional but recommended)
        const style = document.createElement("style");
        style.innerHTML = `
            #loginSuccessModal {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                justify-content: center;
                align-items: center;
                z-index: 1000;
            }
            #loginSuccessContainer {
                background: #4CAF50;
                padding: 20px;
                border-radius: 10px;
                text-align: center;
            }
            #loginSuccessBg svg {
                width: 50px;
                height: 50px;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>

</html>
