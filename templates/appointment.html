<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      height: 100vh;
      display: flex;
    }

    /* Split Layout */
    .left-panel {
      flex: 1;
      background: linear-gradient(-45deg, #43cea2, #185a9d, #00c6ff, #0072ff);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 50px;
      text-align: center;
    }

    .left-panel h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    .left-panel p {
      font-size: 20px;
      max-width: 400px;
      line-height: 1.5;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .right-panel {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f7fa;
    }

    /* Booking Form Card */
    .appointment-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      padding: 40px;
      width: 90%;
      max-width: 500px;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .appointment-card h2 {
      margin-bottom: 25px;
      font-size: 28px;
      color: #185a9d;
      text-align: center;
    }

    .appointment-card input, .appointment-card select {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border: 1px solid #ccc;
      border-radius: 12px;
      outline: none;
      font-size: 16px;
      transition: 0.3s;
    }
    .appointment-card input:focus, .appointment-card select:focus {
      border-color: #43cea2;
      box-shadow: 0 0 8px rgba(67, 206, 162, 0.5);
    }

    .appointment-card button {
      background: linear-gradient(45deg, #43cea2, #185a9d);
      color: #fff;
      padding: 15px;
      margin-top: 20px;
      border: none;
      border-radius: 30px;
      width: 100%;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .appointment-card button:hover {
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      transform: translateY(-3px);
    }

    /* Spinner */
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid #fff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Success Msg */
    #responseMsg {
      margin-top: 20px;
      font-size: 18px;
      display: none;
      text-align: center;
    }
    .success { color: #28a745; font-weight: bold; }

    /* Mobile responsive */
    @media (max-width: 900px) {
      body {
        flex-direction: column;
      }
      .left-panel, .right-panel {
        flex: none;
        width: 100%;
        height: 50vh;
      }
    }
  </style>
</head>
<body>

  <!-- Left Info Section -->
  <div class="left-panel">
    <h1><i class="fas fa-hospital"></i> CureByDiet</h1>
    <p>Your health is our priority. Book appointments with expert doctors and start your journey towards recovery today.</p>
  </div>

  <!-- Right Booking Form -->
  <div class="right-panel">
    <div class="appointment-card">
      <h2><i class="fas fa-calendar-check"></i> Book Appointment</h2>
      <form id="appointmentForm">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email Address" required>
        <input type="tel" placeholder="Phone Number" required>
        <input type="date" required>
        <select required>
          <option value="">Select Doctor</option>
          <option>Dr. A. Sharma (Cardiologist)</option>
          <option>Dr. B. Mehta (Dermatologist)</option>
          <option>Dr. C. Verma (Physician)</option>
        </select>
        <button type="submit" id="submitBtn"><i class="fas fa-paper-plane"></i> Book Appointment</button>
      </form>
      <div id="responseMsg"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById("appointmentForm");
    const submitBtn = document.getElementById("submitBtn");
    const responseMsg = document.getElementById("responseMsg");

    form.addEventListener("submit", function(e){
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="spinner"></div> Booking...';

      setTimeout(() => {
        responseMsg.innerHTML = `<i class="fas fa-check-circle"></i> Appointment booked successfully!`;
        responseMsg.classList.add("success");
        responseMsg.style.display = "block";

        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Book Appointment';
        form.reset();
      }, 2000);
    });
  </script>

</body>
</html>
